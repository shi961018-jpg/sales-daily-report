<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2b241f">
    <title>奶茶店销售日报生成器</title>
    <link rel="stylesheet" href="./styles.css?v=milk-tea-v2">
  </head>
  <body>
    <div class="page-glow one" aria-hidden="true"></div>
    <div class="page-glow two" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="kicker">MILK TEA DAILY REPORT</p>
          <h1>奶茶店销售日报生成器</h1>
          <p class="subtitle">输入饮品销量、售价和成本价，自动计算营业额与毛利，一键复制日报发到微信群。</p>
        </div>
        <div class="date-card">
          <label for="reportDate">报表日期</label>
          <input id="reportDate" class="date-input" type="date" aria-label="选择日报日期">
        </div>
      </header>

      <section class="voice-card" aria-labelledby="voiceTitle">
        <div>
          <p class="section-tag">我的声音配音</p>
          <h2 id="voiceTitle">老板本人语音介绍</h2>
          <p>点击播放，网页会使用你提供的原始录音作为配音音频。</p>
        </div>
        <div class="voice-actions">
          <button class="voice-button" id="voiceButton" type="button">播放我的配音</button>
          <audio id="voiceAudio" controls preload="metadata" src="./assets/my-voice.m4a"></audio>
        </div>
      </section>

      <section class="summary-grid" aria-label="销售概览">
        <article class="summary-card primary">
          <p>总营业额</p>
          <strong id="grandTotal">¥0.00</strong>
        </article>
        <article class="summary-card">
          <p>饮品种类</p>
          <strong id="productCount">0</strong>
        </article>
        <article class="summary-card">
          <p>总销量</p>
          <strong id="quantityTotal">0</strong>
        </article>
        <article class="summary-card cost-card">
          <p>总成本</p>
          <strong id="costTotal">¥0.00</strong>
        </article>
        <article class="summary-card profit-card">
          <p>总毛利</p>
          <strong id="profitTotal">¥0.00</strong>
        </article>
        <article class="summary-card rate-card">
          <p>综合毛利率</p>
          <strong id="profitRate">0.00%</strong>
        </article>
      </section>

      <section class="editor-card" aria-labelledby="entryTitle">
        <div class="section-heading">
          <div>
            <p class="section-tag">今日饮品</p>
            <h2 id="entryTitle">饮品销售明细</h2>
          </div>
          <button class="add-button" id="addRowButton" type="button">+ 添加饮品</button>
        </div>

        <div class="table-heading" aria-hidden="true">
          <span>饮品名称</span>
          <span>销量</span>
          <span>售价</span>
          <span>成本价</span>
          <span>营业额</span>
          <span>毛利</span>
          <span></span>
        </div>
        <div class="sales-list" id="salesList"></div>
      </section>

      <section class="report-card" aria-labelledby="reportTitle">
        <div class="section-heading report-heading">
          <div>
            <p class="section-tag">微信群日报</p>
            <h2 id="reportTitle">可复制日报内容</h2>
          </div>
          <button class="copy-button" id="copyButton" type="button">复制微信群日报</button>
        </div>
        <div class="empty-report" id="emptyReport">录入饮品信息后，这里会自动生成适合发到微信群的销售日报。</div>
        <div class="report-content" id="reportContent" hidden>
          <p class="report-lead" id="reportLead"></p>
          <div class="ranking" id="ranking"></div>
          <p class="report-note">注：本报表根据录入数据自动计算，可直接复制后粘贴到微信群。</p>
        </div>
      </section>

      <p class="toast" id="toast" role="status" aria-live="polite"></p>
    </main>

    <script src="./app.js?v=milk-tea-v2"></script>
  </body>
</html>
